# DMDP-FR stage-1 (dual {16,32})
# Dual-granularity variant aligned with DMDP-FR_stage1_triple; only routing granularity differs.
name: DMDP-FR_stage1_dual
model_type: DMGQVAEModel
num_gpu: 1
manual_seed: 0

datasets:
  train:
    name: FFHQ
    type: FFHQBlindDataset
    dataroot_gt: datasets/ffhq/ffhq_512
    filename_tmpl: '{}'
    io_backend:
      type: disk
    in_size: 512
    gt_size: 512
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]
    use_hflip: true
    use_corrupt: false
    num_worker_per_gpu: 4
    batch_size_per_gpu: 2
    dataset_enlarge_ratio: 100
    prefetch_mode: cpu
    num_prefetch_queue: 64

  val:
    name: CelebA-HQ-512
    type: PairedImageDataset
    dataroot_lq: datasets/faces/validation/gt
    dataroot_gt: datasets/faces/validation/gt
    io_backend:
      type: disk
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]
    scale: 1


# network structures
network_g:
  type: DMGQVAE
  grain_type: dual
  img_size: 512
  ch: 128
  ch_mult: [1, 1, 2, 2, 4, 4]
  num_res_blocks: 2
  attn_resolutions: [16, 32]
  dropout: 0.0
  resamp_with_conv: true
  in_channels: 3
  z_channels: 256
  router_config:
    num_channels: 256
    normalization_type: group-32
    gate_type: 2layer-fc-SiLu
  decoder_ch_mult: [1, 1, 2, 2, 4]
  latent_size: 32
  decoder_attn_resolutions: [32]
  decoder_position_type: fourier+learned
  codebook_size: 1024
  codebook_dim: 256
  commitment_beta: 0.25
  decay: 0.99
  restart_unused_codes: true
  quant_before_dim: 256
  quant_after_dim: 256
  quant_sample_temperature: 0.0

network_d:
  type: UNetDiscriminatorSN
  num_in_ch: 3

path:
  pretrain_network_g: ~
  param_key_g: params_ema
  strict_load_g: true
  pretrain_network_d: ~
  strict_load_d: true
  resume_state: ~

train:
  use_amp: true
  amp_dtype: bfloat16
  grad_accum_steps: 4
  codebook_weight: 1.0
  pixelloss_weight: 1.0
  disc_weight: 0.8
  perceptual_weight: 1.0
  lpips_weight_path: weights/lpips/vgg.pth
  gan_opt:
    type: GANLoss
    gan_type: hinge
    loss_weight: !!float 1.0
  budget_opt:
    target_ratio: 0.50
    gamma: 1.0
    min_grain_size: 16 # 512 / 32 coarse grid
    max_grain_size: 32 # 512 / 16 fine grid
    calculate_all: false

  optim_g:
    type: Adam
    lr: !!float 1e-4
    betas: [0.9, 0.99]

  optim_d:
    type: Adam
    lr: !!float 1e-4
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [50000, 100000, 150000, 200000, 250000, 300000, 350000]
    gamma: 1

  total_iter: 400000

  warmup_iter: -1
  ema_decay: 0.995

  net_g_start_iter: 0
  net_d_iters: 1
  net_d_start_iter: 30001
  manual_seed: 0

val:
  val_freq: !!float 1e5
  save_img: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: false

logger:
  print_freq: 100
  save_checkpoint_freq: !!float 1e5
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29431

find_unused_parameters: true
