# DMDP-FR stage-3: grain-aware feature fusion with image-level fidelity losses.
name: DMDP-FR_stage3_triple
model_type: DMDP-FRModel
num_gpu: 1
manual_seed: 0

datasets:
  train:
    name: FFHQ
    type: FFHQBlindJointDataset
    dataroot_gt: datasets/ffhq/ffhq_512
    filename_tmpl: '{}'
    io_backend:
      type: disk
      
    in_size: 512
    gt_size: 512
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]
    use_hflip: true
    use_corrupt: true
    
    # blur_kernel_size: 41
    # use_motion_kernel: false
    # motion_kernel_prob: 0.001
    # kernel_list: ['iso', 'aniso']
    # kernel_prob: [0.5, 0.5]
    
    # blur_sigma: [0.1, 10]
    # downsample_range: [1, 12]
    # noise_range: [0, 15]
    # jpeg_range: [60, 100]
    
    # blur_sigma_large: [1, 15]
    # downsample_range_large: [4, 30]
    # noise_range_large: [0, 20]
    # jpeg_range_large: [30, 80]

    blur_kernel_size: 41
    use_motion_kernel: false
    motion_kernel_prob: 0.001
    kernel_list: ['iso', 'aniso']
    kernel_prob: [0.5, 0.5]
    # small degradation in stageIII
    blur_sigma: [0.1, 10]
    downsample_range: [0.8, 8]
    noise_range: [0, 20]
    jpeg_range: [60, 100]
    # large degradation in stageII
    blur_sigma_large: [0.1, 15]
    downsample_range_large: [0.8, 30]
    noise_range_large: [0, 20]
    jpeg_range_large: [30, 100]
    
    latent_gt_path: experiments/pretrained_models/dmgqvae/latent_gt_dmgq_triple_code1024.pth
    
    num_worker_per_gpu: 4
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 100
    prefetch_mode: cpu
    num_prefetch_queue: 64
    pin_memory: true
    # persistent_workers: true
    # prefetch_factor: 2

  val:
    name: CelebA-HQ-512
    type: PairedImageDataset
    dataroot_lq: datasets/faces/validation/lq
    dataroot_gt: datasets/faces/validation/gt
    io_backend:
      type: disk
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]
    scale: 1

network_g:
  type: DMDP-FR
  grain_type: triple
  img_size: 512
  ch: 128
  ch_mult: [1, 1, 2, 2, 4, 4, 4]
  num_res_blocks: 2
  attn_resolutions: [8, 16, 32]
  in_channels: 3
  z_channels: 256
  router_config:
    num_channels: 256
    normalization_type: group-32
    gate_type: 2layer-fc-SiLu
  decoder_ch_mult: [1, 1, 2, 2, 4]
  # Keep the stage-3 generator shape identical to stage-1/2 triple checkpoints.
  latent_size: 32
  decoder_attn_resolutions: [32]
  decoder_position_type: fourier+learned
  codebook_size: 1024
  codebook_dim: 256
  dim_embd: 512
  n_head: 8
  n_layers: 9
  max_position_tokens: 4096
  connect_list: ['64', '128', '256']
  # Stage-3 core enhanced fusion: route-aware Gamma and fidelity-controlled route bias.
  gamf_gamma_mode: hard
  gamf_gamma_temperature: 0.7
  route_median_bias: 0.15
  route_fine_bias: 0.45
  fusion_detach_encoder: true
  gamf_residual_scale_init: 0.45
  gamf_residual_scale_max: 1.5
  gamf_gamma_floor: 0.12
  gamf_use_highpass: true
  fix_modules: ['quantize', 'decoder', 'post_quant_conv', 'grain_latent_adapters']

network_vqgan:
  type: DMGQVAE
  grain_type: triple
  img_size: 512
  ch: 128
  ch_mult: [1, 1, 2, 2, 4, 4, 4]
  num_res_blocks: 2
  attn_resolutions: [8, 16, 32]
  in_channels: 3
  z_channels: 256
  router_config:
    num_channels: 256
    normalization_type: group-32
    gate_type: 2layer-fc-SiLu
  decoder_ch_mult: [1, 1, 2, 2, 4]
  latent_size: 32
  decoder_attn_resolutions: [32]
  decoder_position_type: fourier+learned
  codebook_size: 1024
  codebook_dim: 256
  model_path: experiments/20260516_214617_DMDP-FR_stage1_triple/models/net_g_latest.pth

network_d:
  type: UNetDiscriminatorSN
  num_in_ch: 3

path:
  pretrain_network_g: experiments/20260614_204153_DMDP-FR_stage2_triple/models/net_g_latest.pth
  param_key_g: params_ema
  strict_load_g: false
  pretrain_network_d: ~
  strict_load_d: true
  resume_state: ~

train:
  use_amp: true
  amp_dtype: bfloat16
  grad_accum_steps: 2
  use_hq_feat_loss: true
  feat_loss_weight: 1.0
#  code_loss_weight: 0.3
  code_loss_weight_coarse: 0.1
  code_loss_weight_median: 0.3
  code_loss_weight_fine: 1.0
  gate_loss_weight: 0.6
  encoder_gate_loss_weight: 0.2
  scale_adaptive_gan_weight: 0.1
  reset_stage3_fusion: true
  supervise_all_codes: true
  fidelity_weight: 1.0
  fix_generator: true
  use_large_de_train: true
  small_de_w1_until_iter: 40000
  large_de_start_iter: 80000
  large_de_only_until_iter: 120000
  large_de_mixed_interval: 15
  
  optim_g:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  optim_d:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  scheduler:
    type: CosineAnnealingRestartLR
    periods: [150000]
    restart_weights: [1]
    eta_min: !!float 1e-5
  total_iter: 150000
  
  warmup_iter: -1  # no warm up
  ema_decay: 0.997

  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

  perceptual_opt:
    type: LPIPSLoss
    loss_weight: 1.0
    use_input_norm: true
    range_norm: true

  gan_opt:
    type: GANLoss
    gan_type: hinge
    loss_weight: !!float 1.0 # adaptive_weighting

  use_adaptive_weight: true

  net_g_start_iter: 0
  net_d_iters: 1
  net_d_start_iter: 5001
  manual_seed: 0

val:
  val_freq: !!float 1e4
  save_img: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: false

logger:
  print_freq: 100
  save_checkpoint_freq: !!float 1e4
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29434

find_unused_parameters: true
