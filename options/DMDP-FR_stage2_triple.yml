# DMDP-FR stage-2: multi-granularity code/route prediction under CodeFormer degradation.
name: DMDP-FR_stage2_triple
model_type: DMDPFRModel
num_gpu: 1
manual_seed: 0

datasets:
  train:
    name: FFHQ
    type: FFHQBlindDataset
    dataroot_gt: datasets/ffhq/ffhq_512
    filename_tmpl: '{}'
    io_backend:
      type: disk

    in_size: 512
    gt_size: 512
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]
    use_hflip: true
    use_corrupt: true

    blur_kernel_size: 41
    use_motion_kernel: false
    motion_kernel_prob: 0.001
    kernel_list: ['iso', 'aniso']
    kernel_prob: [0.5, 0.5]
    blur_sigma: [0.1, 15]
    downsample_range: [0.8, 30]
    noise_range: [0, 20]
    jpeg_range: [30, 100]

    latent_gt_path: ~

    num_worker_per_gpu: 4
    batch_size_per_gpu: 2
    dataset_enlarge_ratio: 100
    prefetch_mode: ~

  val:
    name: CelebA-HQ-512
    type: PairedImageDataset
    dataroot_lq: datasets/faces/validation/lq
    dataroot_gt: datasets/faces/validation/gt
    io_backend:
      type: disk
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]
    scale: 1

network_g:
  type: DMDPFR
  grain_type: triple
  img_size: 512
  ch: 128
  ch_mult: [1, 1, 2, 2, 4, 4, 4]
  num_res_blocks: 2
  attn_resolutions: [8, 16, 32]
  in_channels: 3
  z_channels: 256
  router_config:
    num_channels: 256
    normalization_type: group-32
    gate_type: 2layer-fc-SiLu
  decoder_ch_mult: [1, 1, 2, 2, 4]
  # Spatial size of the latent feature map passed into the decoder position
  # embedding. For img_size=512 and decoder_ch_mult length 5, this is 512 / 16 = 32.
  latent_size: 32
  # Absolute feature-map resolutions that add attention blocks in the decoder
  # up path. For img_size=512 and this decoder_ch_mult, valid decoder
  # resolutions are 32, 64, 128, 256, 512.
  decoder_attn_resolutions: [32]
  decoder_position_type: fourier+learned
  codebook_size: 1024
  codebook_dim: 256
  dim_embd: 512
  n_head: 8
  n_layers: 9
  max_position_tokens: 4096
  connect_list: ['64', '128', '256']
  fix_modules: ['quantize', 'decoder', 'post_quant_conv', 'grain_latent_adapters']
  stage1_model_path: './experiments/pretrained_models/dqvae/dqvae_stage1_triple.pth'

network_vqgan:
  type: DQDynamicVQVAE
  grain_type: triple
  img_size: 512
  ch: 128
  ch_mult: [1, 1, 2, 2, 4, 4, 4]
  num_res_blocks: 2
  attn_resolutions: [8, 16, 32]
  in_channels: 3
  z_channels: 256
  router_config:
    num_channels: 256
    normalization_type: group-32
    gate_type: 2layer-fc-SiLu
  decoder_ch_mult: [1, 1, 2, 2, 4]
  # Spatial size of the latent feature map passed into the decoder position
  # embedding. For img_size=512 and decoder_ch_mult length 5, this is 512 / 16 = 32.
  latent_size: 32
  # Absolute feature-map resolutions that add attention blocks in the decoder
  # up path. For img_size=512 and this decoder_ch_mult, valid decoder
  # resolutions are 32, 64, 128, 256, 512.
  decoder_attn_resolutions: [32]
  decoder_position_type: fourier+learned
  codebook_size: 1024
  codebook_dim: 256
  model_path: './experiments/pretrained_models/dqvae/dqvae_stage1_triple.pth'

path:
  pretrain_network_g: ~
  param_key_g: params_ema
  strict_load_g: false
  resume_state: ~

train:
  use_amp: true
  amp_dtype: bfloat16
  grad_accum_steps: 4
  use_hq_feat_loss: true
  feat_loss_weight: 1.0
#  code_loss_weight: 0.3
  code_loss_weight_coarse: 0.1
  code_loss_weight_median: 0.3
  code_loss_weight_fine: 1.0
  gate_loss_weight: 0.6
  encoder_gate_loss_weight: 0.2
  supervise_all_codes: true
  fidelity_weight: 0
  optim_g:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  scheduler:
    type: MultiStepLR
    milestones: [400000, 450000]
    gamma: 0.5
  total_iter: 500000
  warmup_iter: -1
  ema_decay: 0.995
  net_g_start_iter: 0
  net_d_iters: 1
  net_d_start_iter: 0
  manual_seed: 0

val:
  val_freq: !!float 1e4
  save_img: true
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: false

logger:
  print_freq: 100
  save_checkpoint_freq: !!float 1e4
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29433

find_unused_parameters: true
